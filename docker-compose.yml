version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: maztech-mkt-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maztech_mkt_hub
    ports:
      - '5432:5432'
    volumes:
      - maztech-mkt-hub-data:/var/lib/postgresql/data
volumes:
  maztech-mkt-hub-data:
